<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Voice to Text</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+SC:wght@300;400;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --border: #222222;
      --accent: #e8ff47;
      --accent-dim: #c8df27;
      --text: #f0f0f0;
      --text-muted: #555555;
      --red: #ff4757;
      --pulse-size: 120px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans SC', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      overflow: hidden;
    }

    /* Background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 48px 48px;
      opacity: 0.4;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 720px;
      display: flex;
      flex-direction: column;
      gap: 2.5rem;
    }

    header {
      display: flex;
      align-items: baseline;
      gap: 1rem;
    }

    .logo {
      font-family: 'Space Mono', monospace;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .tagline {
      font-size: 0.78rem;
      color: var(--text-muted);
      font-family: 'Space Mono', monospace;
    }

    /* Mic button area */
    .mic-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
    }

    .mic-wrapper {
      position: relative;
      width: var(--pulse-size);
      height: var(--pulse-size);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .pulse-ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 2px solid var(--accent);
      opacity: 0;
      transform: scale(1);
      pointer-events: none;
    }

    .listening .pulse-ring:nth-child(1) {
      animation: pulse 2s ease-out infinite;
    }
    .listening .pulse-ring:nth-child(2) {
      animation: pulse 2s ease-out 0.6s infinite;
    }
    .listening .pulse-ring:nth-child(3) {
      animation: pulse 2s ease-out 1.2s infinite;
    }

    @keyframes pulse {
      0%   { transform: scale(1);    opacity: 0.8; }
      100% { transform: scale(2.4);  opacity: 0; }
    }

    .mic-btn {
      position: relative;
      z-index: 2;
      width: 72px;
      height: 72px;
      border-radius: 50%;
      border: 2px solid var(--border);
      background: var(--surface);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.2s, background 0.2s, transform 0.15s;
      outline: none;
    }

    .mic-btn:hover {
      border-color: var(--accent);
      transform: scale(1.05);
    }

    .mic-btn.listening {
      border-color: var(--accent);
      background: #1a1f00;
    }

    .mic-btn svg {
      width: 28px;
      height: 28px;
      fill: var(--text-muted);
      transition: fill 0.2s;
    }

    .mic-btn.listening svg,
    .mic-btn:hover svg {
      fill: var(--accent);
    }

    .status-label {
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem;
      color: var(--text-muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      transition: color 0.2s;
    }

    .status-label.listening {
      color: var(--accent);
    }

    .status-label.error {
      color: var(--red);
    }

    /* Waveform visualizer */
    .waveform {
      display: flex;
      align-items: center;
      gap: 3px;
      height: 32px;
    }

    .bar {
      width: 3px;
      border-radius: 2px;
      background: var(--border);
      height: 4px;
      transition: height 0.1s ease;
    }

    .listening .bar {
      background: var(--accent);
      animation: wave 0.8s ease-in-out infinite;
    }

    .listening .bar:nth-child(1)  { animation-delay: 0.0s; }
    .listening .bar:nth-child(2)  { animation-delay: 0.1s; }
    .listening .bar:nth-child(3)  { animation-delay: 0.2s; }
    .listening .bar:nth-child(4)  { animation-delay: 0.3s; }
    .listening .bar:nth-child(5)  { animation-delay: 0.4s; }
    .listening .bar:nth-child(6)  { animation-delay: 0.3s; }
    .listening .bar:nth-child(7)  { animation-delay: 0.2s; }
    .listening .bar:nth-child(8)  { animation-delay: 0.1s; }
    .listening .bar:nth-child(9)  { animation-delay: 0.0s; }
    .listening .bar:nth-child(10) { animation-delay: 0.15s; }
    .listening .bar:nth-child(11) { animation-delay: 0.25s; }
    .listening .bar:nth-child(12) { animation-delay: 0.35s; }

    @keyframes wave {
      0%, 100% { height: 4px; }
      50%       { height: 24px; }
    }

    /* Transcript area */
    .transcript-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1.5rem;
      min-height: 180px;
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .transcript-box-label {
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      color: var(--text-muted);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      border-bottom: 1px solid var(--border);
      padding-bottom: 0.75rem;
    }

    #interim {
      font-size: 0.95rem;
      color: var(--text-muted);
      font-style: italic;
      min-height: 1.4em;
      line-height: 1.7;
    }

    #final {
      font-size: 1rem;
      line-height: 1.8;
      color: var(--text);
      white-space: pre-wrap;
      word-break: break-word;
      flex: 1;
    }

    .placeholder {
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    /* Actions */
    .actions {
      display: flex;
      gap: 0.75rem;
      justify-content: flex-end;
    }

    .btn {
      font-family: 'Space Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.5rem 1.1rem;
      border-radius: 3px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }

    .btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .btn-copy {
      border-color: var(--accent);
      color: var(--accent);
    }

    .btn-copy:hover {
      background: var(--accent);
      color: var(--bg);
    }

    /* Lang selector */
    .lang-row {
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }

    .lang-label {
      font-family: 'Space Mono', monospace;
      font-size: 0.68rem;
      color: var(--text-muted);
      letter-spacing: 0.1em;
    }

    .lang-btn {
      font-family: 'Space Mono', monospace;
      font-size: 0.68rem;
      padding: 0.3rem 0.7rem;
      border-radius: 2px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s;
    }

    .lang-btn.active, .lang-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: var(--accent);
      color: var(--bg);
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem;
      padding: 0.5rem 1.2rem;
      border-radius: 3px;
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
      z-index: 100;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* Not supported */
    .unsupported {
      background: #1a0a0a;
      border: 1px solid var(--red);
      border-radius: 4px;
      padding: 1rem 1.5rem;
      font-size: 0.85rem;
      color: var(--red);
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <span class="logo">Voice → Text</span>
      <span class="tagline">// Web Speech API demo</span>
    </header>

    <div class="unsupported" id="unsupported">
      ⚠ 当前浏览器不支持 Web Speech API，请使用 Chrome 或 Edge。
    </div>

    <div class="lang-row">
      <span class="lang-label">Lang:</span>
      <button class="lang-btn active" data-lang="zh-CN">中文</button>
      <button class="lang-btn" data-lang="en-US">English</button>
      <button class="lang-btn" data-lang="ja-JP">日本語</button>
    </div>

    <div class="mic-section" id="micSection">
      <div class="mic-wrapper" id="micWrapper">
        <div class="pulse-ring"></div>
        <div class="pulse-ring"></div>
        <div class="pulse-ring"></div>
        <button class="mic-btn" id="micBtn" title="点击开始录音">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 1a4 4 0 0 1 4 4v6a4 4 0 0 1-8 0V5a4 4 0 0 1 4-4zm0 2a2 2 0 0 0-2 2v6a2 2 0 0 0 4 0V5a2 2 0 0 0-2-2zM7.5 11a.5.5 0 0 1 .5.5 4 4 0 0 0 8 0 .5.5 0 0 1 1 0 5 5 0 0 1-4.5 4.975V19h2a.5.5 0 0 1 0 1h-5a.5.5 0 0 1 0-1h2v-2.525A5 5 0 0 1 7 11.5a.5.5 0 0 1 .5-.5z"/>
          </svg>
        </button>
      </div>

      <div class="waveform" id="waveform">
        <div class="bar"></div><div class="bar"></div><div class="bar"></div>
        <div class="bar"></div><div class="bar"></div><div class="bar"></div>
        <div class="bar"></div><div class="bar"></div><div class="bar"></div>
        <div class="bar"></div><div class="bar"></div><div class="bar"></div>
      </div>

      <span class="status-label" id="statusLabel">点击麦克风开始</span>
    </div>

    <div class="transcript-box">
      <div class="transcript-box-label">Transcript</div>
      <div id="interim" class="placeholder">实时识别结果将显示在这里…</div>
      <div id="final"><span class="placeholder">最终文字将出现在这里</span></div>
    </div>

    <div class="actions">
      <button class="btn" id="clearBtn">Clear</button>
      <button class="btn btn-copy" id="copyBtn">Copy</button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    const micBtn     = document.getElementById('micBtn');
    const micWrapper = document.getElementById('micWrapper');
    const waveform   = document.getElementById('waveform');
    const statusLabel = document.getElementById('statusLabel');
    const interimEl  = document.getElementById('interim');
    const finalEl    = document.getElementById('final');
    const clearBtn   = document.getElementById('clearBtn');
    const copyBtn    = document.getElementById('copyBtn');
    const toastEl    = document.getElementById('toast');
    const langBtns   = document.querySelectorAll('.lang-btn');
    const unsupported = document.getElementById('unsupported');

    let recognition = null;
    let isListening = false;
    let finalText = '';
    let currentLang = 'zh-CN';

    if (!SpeechRecognition) {
      unsupported.style.display = 'block';
      micBtn.disabled = true;
    } else {
      initRecognition();
    }

    function initRecognition() {
      if (recognition) {
        recognition.onend = null;
        recognition.abort();
      }
      recognition = new SpeechRecognition();
      recognition.lang = currentLang;
      recognition.continuous = true;
      recognition.interimResults = true;
      recognition.maxAlternatives = 1;

      recognition.onstart = () => {
        isListening = true;
        micBtn.classList.add('listening');
        micWrapper.classList.add('listening');
        waveform.classList.add('listening');
        statusLabel.textContent = '正在聆听…';
        statusLabel.className = 'status-label listening';
        interimEl.textContent = '';
        interimEl.classList.remove('placeholder');
      };

      recognition.onresult = (e) => {
        let interim = '';
        for (let i = e.resultIndex; i < e.results.length; i++) {
          const t = e.results[i][0].transcript;
          if (e.results[i].isFinal) {
            finalText += t;
          } else {
            interim += t;
          }
        }
        interimEl.textContent = interim;
        if (finalText) {
          finalEl.innerHTML = '';
          finalEl.textContent = finalText;
        }
      };

      recognition.onerror = (e) => {
        const msgs = {
          'not-allowed': '麦克风权限被拒绝',
          'no-speech':   '未检测到语音',
          'network':     '网络错误',
          'aborted':     '已中止',
        };
        showStatus(msgs[e.error] || `错误: ${e.error}`, 'error');
        stopListening();
      };

      recognition.onend = () => {
        if (isListening) {
          recognition.start();
        }
      };
    }

    function startListening() {
      finalText = finalText || '';
      initRecognition();
      recognition.start();
    }

    function stopListening() {
      isListening = false;
      if (recognition) recognition.stop();
      micBtn.classList.remove('listening');
      micWrapper.classList.remove('listening');
      waveform.classList.remove('listening');
      statusLabel.textContent = '点击麦克风开始';
      statusLabel.className = 'status-label';
      interimEl.textContent = '';
    }

    function showStatus(msg, type = '') {
      statusLabel.textContent = msg;
      statusLabel.className = 'status-label' + (type ? ` ${type}` : '');
    }

    micBtn.addEventListener('click', () => {
      if (isListening) {
        stopListening();
      } else {
        startListening();
      }
    });

    clearBtn.addEventListener('click', () => {
      stopListening();
      finalText = '';
      finalEl.innerHTML = '<span class="placeholder">最终文字将出现在这里</span>';
      interimEl.textContent = '';
      interimEl.classList.add('placeholder');
      interimEl.textContent = '实时识别结果将显示在这里…';
    });

    copyBtn.addEventListener('click', () => {
      const text = finalText || finalEl.textContent;
      if (!text || finalEl.querySelector('.placeholder')) {
        showToast('没有可复制的文字');
        return;
      }
      navigator.clipboard.writeText(text).then(() => {
        showToast('已复制到剪贴板 ✓');
      });
    });

    langBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        langBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentLang = btn.dataset.lang;
        if (isListening) {
          stopListening();
          setTimeout(startListening, 200);
        }
      });
    });

    function showToast(msg) {
      toastEl.textContent = msg;
      toastEl.classList.add('show');
      setTimeout(() => toastEl.classList.remove('show'), 2000);
    }
  </script>
</body>
</html>
